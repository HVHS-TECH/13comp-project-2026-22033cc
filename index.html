<!DOCTYPE html>
<html lang="en">
<head>

    <!--style sheets-->

<body>
    
<div id="top">
    <h1> Welcome to my 13 Comp project!</h1>
    <p id="playertalk" style ="display:inline-block">welcome to my website!</p>
</div>
<div id="login" style="display:none">
    <button class="Button" onclick="fb_authenticate()">Sign in!</button>
</div>

<div id = "userCom">
</div>

<!-- style="display:none" -->
<form id="form" style="display:none" >
    <p>please fill in your name!!</p>
    
    <!--yoinking information-->
    
    <label for="Username">Your Name,Please:</label>
        <input type="text" id="userName" name="name" minlength="3" maxlength="20" required /><br>
    <label for="userage"> your Age, Please:</label>
        <input type="number" id="userAge" name="userage"  min="5" max ="120" /><br>
     <label for="usercol"> your favourite colour?: </label>
        <input type="color" id="userCol" name="userCol" value="#00000"  /><br>
    <label for="userMovie"> The title of your favourite movie?:</label>
        <input type="text" id="userMovie" name="userMovie" minlength ="1" required/><br>
    <label for="userHand"> handedness???:</label>
        <select name="userHand" id="userHand">
            <option value="right">Right handed</option>
            <option value="left">Left handed</option>
            <option value="ambidextrous">Ambidextrous</option>
        </select><br>
    <label for="userShape">Trianges or squares?:</label>
        <select name="userShape" id="userShape">
            <option value="triangles">Triangles</option>
            <option value="squares">Squares</option>
        </select><br>
    <button type="button" onclick="fb_createAccount()">Create Account!</button> 
</form>
